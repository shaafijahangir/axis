name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'nexused-frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'nexused-frontend/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: nexused-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nexused-frontend

      - name: Lint
        run: npm run lint
        working-directory: nexused-frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: nexused-frontend

      - name: Build
        run: npm run build
        working-directory: nexused-frontend
