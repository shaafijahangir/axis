## Local-dev infrastructure (Postgres + Redis + MinIO).
## App processes (backend / frontend / mobile) run natively on the host
## so you get hot reload, breakpoints, and clean stdout. Containers exist
## only for stateful infra you don't want to install per-machine.
##
## Usage:
##   pnpm infra:up      # start postgres + redis + minio
##   pnpm infra:down    # stop everything (data persists in volumes)
##   pnpm infra:reset   # nukes volumes — clean slate
##
## The `app` profile is opt-in (build the full container stack only when
## testing the production image locally). Daily dev does NOT use it.

services:
  postgres:
    image: postgres:16-alpine
    container_name: axis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: axis
    ports:
      # 5433 to avoid clashing with a system Postgres on the default port
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: axis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: axis-minio
    environment:
      MINIO_ROOT_USER: axisdev
      MINIO_ROOT_PASSWORD: axisdev123
    ports:
      # S3 API + Web console
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot bucket creator. Runs on `infra:up`, exits 0 after the bucket
  # exists. Safe to re-run — `mc mb` is idempotent (|| true catches the
  # "already exists" non-zero on later runs).
  minio-init:
    image: minio/mc:latest
    container_name: axis-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 axisdev axisdev123 &&
      (mc mb local/axis || true) &&
      echo 'bucket axis ready'
      "

  ## ── Production app images (opt-in, profile-gated) ───────────────────
  ## Use `docker compose --profile app up` to spin up the prod-style
  ## containers locally. Not used for daily dev — no hot reload.

  backend:
    profiles: ["app"]
    build:
      context: ./axis-backend
      dockerfile: Dockerfile
    env_file:
      - ./axis-backend/.env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      R2_ENDPOINT: http://minio:9000
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    profiles: ["app"]
    build:
      context: ./axis-frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3002/api
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
